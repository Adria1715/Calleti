<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una Carta Para Ti ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
color:#ff5c8d;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

.card{
width:90%;
max-width:700px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
position:relative;
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

#snoopy{
position:absolute;
top:-60px;
right:-10px;
width:120px;
}

#dialog{
background:#f2f2f2;
padding:12px;
border-radius:15px;
margin-bottom:20px;
min-height:60px;
font-size:17px;
}

#text{
font-size:18px;
line-height:1.7;
white-space:pre-line;
min-height:220px;
}

button{
margin-top:18px;
padding:12px 22px;
border:none;
border-radius:30px;
background:#ff5c8d;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2e70;
}

.choice{
display:flex;
gap:15px;
justify-content:center;
margin-top:25px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div id="hearts"></div>

<div class="card">

<img id="snoopy"
src="https://upload.wikimedia.org/wikipedia/en/5/53/Snoopy_Peanuts.png">

<div id="dialog"></div>

<div id="text"></div>

<div id="buttons">
<button onclick="start()">Abrir la carta 💌</button>
</div>

<div id="choices" class="choice hidden">
<button onclick="ending1()">❤️ Seguir leyendo</button>
<button onclick="ending2()">🌙 Cerrar la carta</button>
</div>

</div>

<script>

const dialog=document.getElementById("dialog");
const text=document.getElementById("text");
const buttons=document.getElementById("buttons");
const choices=document.getElementById("choices");

function type(element,message,speed=35,callback=null){

element.innerHTML="";
let i=0;

let timer=setInterval(()=>{

element.innerHTML+=message.charAt(i);

i++;

if(i>=message.length){
clearInterval(timer);

if(callback)callback();

}

},speed);

}

function start(){

buttons.classList.add("hidden");

type(dialog,
"🐶 Hola... Soy Snoopy. Hoy me pidieron ayudarte a leer una carta muy especial...",
30,

()=>{

setTimeout(()=>{

type(text,

"Si estás leyendo esto es porque hubo algo que me hizo pensar en ti.\n\nNo pretendo cambiar tu vida con unas palabras.\nSolo quería regalarte unos minutos, una sonrisa y hacerte saber que disfruto mucho cuando coincidimos.\n\nHay personas que aparecen sin hacer ruido... pero terminan haciendo que los días sean mejores.\n\nQuizá tú no lo notes, pero eres una de ellas.\n\nAhora necesito saber algo antes de continuar...",

20,

()=>{

choices.classList.remove("hidden");

});

},800);

});

}

function ending1(){

choices.classList.add("hidden");

type(dialog,
"🐶 Me alegra que hayas decidido continuar...",
30);

type(text,
"Quería decirte que no escribí esta carta esperando una respuesta inmediata.\n\nSimplemente quería que supieras que eres una persona muy especial para mí.\n\nOjalá podamos seguir compartiendo momentos, conversaciones y sonrisas.\n\nGracias por llegar a mi vida. ❤️",
20);

}

function ending2(){

choices.classList.add("hidden");

type(dialog,
"🐶 Está bien... también respeto tu decisión.",
30);

type(text,
"No importa cuál haya sido tu elección.\n\nSolo quería que supieras que hay personas que dejan una huella bonita incluso sin darse cuenta.\n\nEspero que algún día vuelvas a abrir esta carta.\n\nHasta entonces... te deseo toda la felicidad del mundo. 🌙",
20);

}

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

},350);

</script>

</body>
</html>
